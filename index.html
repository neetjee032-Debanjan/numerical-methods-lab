<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Analytics Learning Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0b1020;
color:white;
}

#sidebar{
width:300px;
background:#111827;
overflow:auto;
padding:10px;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
cursor:pointer;
border-radius:6px;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#content{
flex:1;
display:flex;
}

#theory{
flex:1;
padding:20px;
overflow:auto;
border-right:1px solid #1f2937;
}

#lab{
flex:1;
padding:20px;
overflow:auto;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

button{
padding:8px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">

<h3>📊 Data Analytics Syllabus</h3>

<div class="topic active" onclick="load('intro')">Introduction</div>
<div class="topic" onclick="load('types')">Types of Data</div>
<div class="topic" onclick="load('collection')">Data Collection</div>
<div class="topic" onclick="load('cleaning')">Data Cleaning</div>
<div class="topic" onclick="load('stats')">Descriptive Stats</div>
<div class="topic" onclick="load('prob')">Probability</div>
<div class="topic" onclick="load('corr')">Correlation</div>
<div class="topic" onclick="load('reg')">Regression</div>
<div class="topic" onclick="load('eda')">EDA</div>

</div>

<div id="main">

<div id="content">

<div id="theory">
<h2>Welcome</h2>
<p>Select a topic to start learning</p>
</div>

<div id="lab">
<h3>🧪 Lab Area</h3>
<p>Visualizations will appear here</p>
</div>

</div>

</div>

<script>

let chart;

/* ---------------- THEORY CONTENT ---------------- */

const theory = {

intro: `
<h2>Introduction to Data Analytics</h2>
<p>Data Analytics is the process of extracting insights from raw data using statistics and computation.</p>
<p>It is used in business, healthcare, AI, finance, and science.</p>
<p><b>Goal:</b> Turn raw data → useful decisions</p>
`,

types: `
<h2>Types of Data</h2>
<p><b>Qualitative:</b> Categories (color, gender)</p>
<p><b>Quantitative:</b> Numbers (height, salary)</p>
<p><b>Discrete:</b> Countable values</p>
<p><b>Continuous:</b> Measurable values</p>
`,

collection: `
<h2>Data Collection</h2>
<p>Data is collected using surveys, sensors, APIs, and web scraping.</p>
<p>High-quality data collection ensures accurate analysis.</p>
`,

cleaning: `
<h2>Data Cleaning</h2>
<p>Fix missing values, remove duplicates, and correct errors.</p>
<p>Dirty data leads to wrong conclusions.</p>
`,

stats: `
<h2>Descriptive Statistics</h2>
<p>Mean, median, mode, variance describe data distribution.</p>
<p>Used for summarizing datasets.</p>
`,

prob: `
<h2>Probability</h2>
<p>Probability measures uncertainty.</p>
<p>Used in prediction and AI systems.</p>
`,

corr: `
<h2>Correlation</h2>
<p>Measures relationship between variables.</p>
<p>Does NOT imply causation.</p>
`,

reg: `
<h2>Regression</h2>
<p>Used to predict values using relationships between variables.</p>
<p>Example: house price prediction.</p>
`,

eda: `
<h2>Exploratory Data Analysis</h2>
<p>Understanding dataset before modeling.</p>
<p>Includes visualization and statistics.</p>
`
};

/* ---------------- LAB SYSTEM ---------------- */

function runLab(topic){

if(chart) chart.destroy();

const lab = document.getElementById("lab");

if(topic==="stats"){

let data=[];
for(let i=0;i<20;i++) data.push(Math.random()*100);

chart=new Chart(lab.appendChild(document.createElement("canvas")),{
type:"bar",
data:{
labels:data.map((_,i)=>i),
datasets:[{
label:"Data",
data:data,
backgroundColor:"#38bdf8"
}]
}
});

}

if(topic==="prob"){

let n=1000, h=0;
for(let i=0;i<n;i++) if(Math.random()>0.5) h++;

chart=new Chart(lab.appendChild(document.createElement("canvas")),{
type:"pie",
data:{
labels:["Heads","Tails"],
datasets:[{
data:[h,n-h],
backgroundColor:["#38bdf8","#f87171"]
}]
}
});

}

if(topic==="corr"){

let data=[];
for(let i=0;i<25;i++){
data.push({x:i,y:i*2+Math.random()*10});
}

chart=new Chart(lab.appendChild(document.createElement("canvas")),{
type:"scatter",
data:{
datasets:[{
data:data,
backgroundColor:"#38bdf8"
}]
}
});

}

if(topic==="reg"){

let x=[],y=[],line=[];

for(let i=0;i<25;i++){
x.push(i);
y.push(i*3+Math.random()*10);
line.push(i*3);
}

chart=new Chart(lab.appendChild(document.createElement("canvas")),{
type:"line",
data:{
labels:x,
datasets:[
{label:"Data",data:y,borderColor:"#38bdf8",fill:false},
{label:"Trend",data:line,borderColor:"#f87171",fill:false}
]
}
});

}

}

/* ---------------- MAIN LOAD ---------------- */

function load(topic){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("theory").innerHTML =
theory[topic] || "<h2>Coming soon</h2>";

document.getElementById("lab").innerHTML =
"<h3>🧪 Lab</h3>";

runLab(topic);

}

</script>

</body>
</html>
