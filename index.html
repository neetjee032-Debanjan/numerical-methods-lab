
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enterprise Data Science Workbench</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0a0f1f;
color:white;
}

/* SIDEBAR */
#sidebar{
width:320px;
background:#111827;
padding:10px;
overflow:auto;
border-right:1px solid #1f2937;
}

.topic{
padding:10px;
margin:6px;
background:#1f2937;
border-radius:6px;
cursor:pointer;
}

.topic:hover{background:#374151;}
.topic.active{background:#38bdf8;color:black;}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
padding:12px;
border-bottom:1px solid #1f2937;
}

#content{
flex:1;
display:flex;
gap:10px;
padding:10px;
}

.panel{
flex:1;
background:#111827;
padding:10px;
border-radius:10px;
overflow:auto;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

select, button, input{
padding:8px;
margin:5px 0;
width:100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">

<h3>📊 Enterprise DS Workbench</h3>

<div class="topic active" onclick="load('intro')">Introduction</div>
<div class="topic" onclick="load('csv')">Dataset Loader</div>
<div class="topic" onclick="load('eda')">EDA Engine</div>
<div class="topic" onclick="load('corr')">Correlation Matrix</div>
<div class="topic" onclick="load('reg')">Regression Engine</div>
<div class="topic" onclick="load('kmeans')">K-Means ML</div>
<div class="topic" onclick="load('pca')">PCA Projection</div>

</div>

<!-- MAIN -->
<div id="main">

<div id="header">
<h2 id="title">Enterprise Data Science Platform</h2>
<p id="desc">Professional-level analytics environment</p>
</div>

<div id="content">

<div class="panel" id="left"></div>
<div class="panel" id="right"></div>

</div>

</div>

<script>

let dataset = [];
let columns = [];
let chart;

/* ---------------- MATH CORE ---------------- */

function mean(a){return a.reduce((x,y)=>x+y)/a.length;}
function variance(a){let m=mean(a);return mean(a.map(x=>(x-m)**2));}
function std(a){return Math.sqrt(variance(a));}

/* correlation */
function corr(x,y){
let mx=mean(x), my=mean(y);
let num=0, dx=0, dy=0;
for(let i=0;i<x.length;i++){
num += (x[i]-mx)*(y[i]-my);
dx += (x[i]-mx)**2;
dy += (y[i]-my)**2;
}
return num/Math.sqrt(dx*dy);
}

/* ---------------- CSV ENGINE ---------------- */

function parseCSV(text){
let rows=text.trim().split("\n").map(r=>r.split(","));
columns=rows[0];
return columns.map((_,i)=>rows.slice(1).map(r=>+r[i]));
}

/* ---------------- LOAD SYSTEM ---------------- */

function load(page){

document.querySelectorAll(".topic").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("left").innerHTML="";
document.getElementById("right").innerHTML="";

if(chart) chart.destroy();

/* ---------------- INTRO ---------------- */
if(page==="intro"){
document.getElementById("left").innerHTML=`
<h2>Enterprise Data Science Workbench</h2>
<p>This is a professional-grade browser-based analytics environment.</p>
<p>Features:</p>
<ul>
<li>Dataset exploration</li>
<li>Statistical analysis</li>
<li>ML simulation (K-Means, PCA)</li>
</ul>
`;
return;
}

/* ---------------- CSV ---------------- */
if(page==="csv"){
document.getElementById("left").innerHTML=`
<h3>Upload Dataset</h3>
<input type="file" id="file">
<button onclick="loadCSV()">Load</button>
`;
}

/* ---------------- CONTROLS ---------------- */
if(["eda","corr","reg","kmeans","pca"].includes(page)){
renderControls(page);
}

}

/* ---------------- CSV LOAD ---------------- */

function loadCSV(){
let file=document.getElementById("file").files[0];
let reader=new FileReader();

reader.onload=function(e){
dataset=parseCSV(e.target.result);
renderControls("eda");
};

reader.readAsText(file);
}

/* ---------------- CONTROLS ---------------- */

function renderControls(mode){

document.getElementById("left").innerHTML=`
<h3>Controls</h3>

<select id="x"></select>
<select id="y"></select>

<button onclick="run('eda')">EDA</button>
<button onclick="run('corr')">Correlation</button>
<button onclick="run('reg')">Regression</button>
<button onclick="run('kmeans')">K-Means</button>
<button onclick="run('pca')">PCA</button>
`;

setTimeout(()=>{

let x=document.getElementById("x");
let y=document.getElementById("y");

x.innerHTML="";
y.innerHTML="";

columns.forEach(c=>{
x.innerHTML+=`<option>${c}</option>`;
y.innerHTML+=`<option>${c}</option>`;
});

},100);
}

/* ---------------- RUN ANALYTICS ---------------- */

function run(type){

if(chart) chart.destroy();

let x=dataset[columns.indexOf(document.getElementById("x").value)];
let y=dataset[columns.indexOf(document.getElementById("y").value)];

let canvas=document.createElement("canvas");
document.getElementById("right").innerHTML="";
document.getElementById("right").appendChild(canvas);

/* ---------------- EDA ---------------- */
if(type==="eda"){
document.getElementById("right").innerHTML=`
<h3>EDA Summary</h3>
<p>Mean X: ${mean(x).toFixed(2)}</p>
<p>Std X: ${std(x).toFixed(2)}</p>
<p>Mean Y: ${mean(y).toFixed(2)}</p>
<p>Std Y: ${std(y).toFixed(2)}</p>
<p>Correlation: ${corr(x,y).toFixed(3)}</p>
`;
}

/* ---------------- CORRELATION ---------------- */
if(type==="corr"){
chart=new Chart(canvas,{
type:"scatter",
data:{datasets:[{data:x.map((v,i)=>({x:v,y:y[i]})),backgroundColor:"#38bdf8"}]}
});
}

/* ---------------- REGRESSION ---------------- */
if(type==="reg"){
let line=x.map(v=>v*1.2);

chart=new Chart(canvas,{
type:"line",
data:{
labels:x,
datasets:[
{label:"Data",data:y,borderColor:"#38bdf8",fill:false},
{label:"Model",data:line,borderColor:"#f87171",fill:false}
]
}
});
}

/* ---------------- K-MEANS (SIMULATED) ---------------- */
if(type==="kmeans"){
let cluster1=[], cluster2=[];

for(let i=0;i<x.length;i++){
if(x[i]>mean(x)){
cluster1.push({x:x[i],y:y[i]});
}else{
cluster2.push({x:x[i],y:y[i]});
}
}

chart=new Chart(canvas,{
type:"scatter",
data:{
datasets:[
{label:"Cluster 1",data:cluster1,backgroundColor:"#38bdf8"},
{label:"Cluster 2",data:cluster2,backgroundColor:"#f87171"}
]
}
});
}

/* ---------------- PCA (SIMPLIFIED PROJECTION) ---------------- */
if(type==="pca"){
let mx=mean(x), my=mean(y);

let projected = x.map((v,i)=>({
x:v-mx,
y:y[i]-my
}));

chart=new Chart(canvas,{
type:"scatter",
data:{datasets:[{data:projected,backgroundColor:"#38bdf8"}]}
});
}

}

</script>

</body>
</html>
